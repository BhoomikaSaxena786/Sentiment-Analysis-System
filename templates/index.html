<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Sentiment Analyzer</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 450px; }
        h1 { color: #333; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background-color: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #0056b3; }
        .result-box { margin-top: 30px; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 20px; }
        .pos { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .neg { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sentiment Analyzer</h1>
        <p>Enter text to check the emotion</p>

        <form action="/predict" method="POST">
            <textarea name="review" placeholder="Type your review here..." required>{{ original_text if original_text }}</textarea>
            <br> <button type="submit" class="btn">Analyze Sentiment</button>
        </form>

        {% if prediction_text is defined %}
            <div class="result-box {{ 'pos' if prediction_text == 1 else 'neg' }}">
                Result: {{ 'POSITIVE 😊' if prediction_text == 1 else 'NEGATIVE 😞' }}
            </div>
        {% endif %}
    </div>

</body>
</html>
